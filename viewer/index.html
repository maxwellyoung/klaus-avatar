<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
    }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      font-size: 11px;
      letter-spacing: 0.05em;
      opacity: 0.5;
      text-transform: uppercase;
    }
    #hud .name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
      margin-bottom: 4px;
      opacity: 1;
    }
    #status {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 10;
      font-size: 10px;
      opacity: 0.3;
      letter-spacing: 0.05em;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: #000;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .inner {
      text-align: center;
    }
    #loading h2 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.2em;
      opacity: 0.6;
    }
    #loading .pulse {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      margin: 16px auto 0;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.5); }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="name">KLAUS</div>
    <div id="anim-info">initializing...</div>
  </div>
  <div id="status">klaus-avatar v1.0</div>

  <div id="loading">
    <div class="inner">
      <h2>KLAUS</h2>
      <div class="pulse"></div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils, VRMHumanBoneName } from '@pixiv/three-vrm';

    // --- Scene setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;
    controls.minDistance = 1.5;
    controls.maxDistance = 8;
    controls.update();

    // --- Lighting (dramatic, cinematic three-point) ---
    const ambient = new THREE.AmbientLight(0xffffff, 0.25);
    scene.add(ambient);

    // Key light — warm, top-right
    const key = new THREE.DirectionalLight(0xfff5e6, 1.4);
    key.position.set(2, 3, 2);
    key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    scene.add(key);

    // Fill — cool blue, left side
    const fill = new THREE.DirectionalLight(0x6688cc, 0.35);
    fill.position.set(-3, 1.5, 0);
    scene.add(fill);

    // Rim — backlight for silhouette edge
    const rim = new THREE.DirectionalLight(0xffffff, 0.7);
    rim.position.set(0, 2, -3);
    scene.add(rim);

    // Eye light — subtle catch light from below camera
    const eye = new THREE.PointLight(0xffffff, 0.15, 5);
    eye.position.set(0, 1.2, 2.5);
    scene.add(eye);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.95 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // --- State ---
    let currentVRM = null;
    let mixer = null;
    let proceduralAnim = null;
    const clock = new THREE.Clock();

    // JSON bone name → VRMHumanBoneName
    const JSON_BONE_MAP = {
      'hips': VRMHumanBoneName.Hips,
      'spine': VRMHumanBoneName.Spine,
      'chest': VRMHumanBoneName.Chest,
      'upperChest': VRMHumanBoneName.UpperChest,
      'neck': VRMHumanBoneName.Neck,
      'head': VRMHumanBoneName.Head,
      'leftShoulder': VRMHumanBoneName.LeftShoulder,
      'rightShoulder': VRMHumanBoneName.RightShoulder,
      'leftUpperArm': VRMHumanBoneName.LeftUpperArm,
      'rightUpperArm': VRMHumanBoneName.RightUpperArm,
      'leftLowerArm': VRMHumanBoneName.LeftLowerArm,
      'rightLowerArm': VRMHumanBoneName.RightLowerArm,
      'leftHand': VRMHumanBoneName.LeftHand,
      'rightHand': VRMHumanBoneName.RightHand,
      'leftUpperLeg': VRMHumanBoneName.LeftUpperLeg,
      'rightUpperLeg': VRMHumanBoneName.RightUpperLeg,
      'leftLowerLeg': VRMHumanBoneName.LeftLowerLeg,
      'rightLowerLeg': VRMHumanBoneName.RightLowerLeg,
      'leftFoot': VRMHumanBoneName.LeftFoot,
      'rightFoot': VRMHumanBoneName.RightFoot,
    };

    // Mixamo → VRM bone name mapping (for FBX drag-and-drop)
    const MIXAMO_TO_VRM = {
      'mixamorigHips': VRMHumanBoneName.Hips,
      'mixamorigSpine': VRMHumanBoneName.Spine,
      'mixamorigSpine1': VRMHumanBoneName.Chest,
      'mixamorigSpine2': VRMHumanBoneName.UpperChest,
      'mixamorigNeck': VRMHumanBoneName.Neck,
      'mixamorigHead': VRMHumanBoneName.Head,
      'mixamorigLeftShoulder': VRMHumanBoneName.LeftShoulder,
      'mixamorigLeftArm': VRMHumanBoneName.LeftUpperArm,
      'mixamorigLeftForeArm': VRMHumanBoneName.LeftLowerArm,
      'mixamorigLeftHand': VRMHumanBoneName.LeftHand,
      'mixamorigRightShoulder': VRMHumanBoneName.RightShoulder,
      'mixamorigRightArm': VRMHumanBoneName.RightUpperArm,
      'mixamorigRightForeArm': VRMHumanBoneName.RightLowerArm,
      'mixamorigRightHand': VRMHumanBoneName.RightHand,
      'mixamorigLeftUpLeg': VRMHumanBoneName.LeftUpperLeg,
      'mixamorigLeftLeg': VRMHumanBoneName.LeftLowerLeg,
      'mixamorigLeftFoot': VRMHumanBoneName.LeftFoot,
      'mixamorigLeftToeBase': VRMHumanBoneName.LeftToes,
      'mixamorigRightUpLeg': VRMHumanBoneName.RightUpperLeg,
      'mixamorigRightLeg': VRMHumanBoneName.RightLowerLeg,
      'mixamorigRightFoot': VRMHumanBoneName.RightFoot,
      'mixamorigRightToeBase': VRMHumanBoneName.RightToes,
    };

    // --- VRM Loading ---
    async function loadVRMFromURL(url) {
      const loader = new GLTFLoader();
      loader.register((parser) => new VRMLoaderPlugin(parser));

      const gltf = await loader.loadAsync(url);
      const vrm = gltf.userData.vrm;
      if (!vrm) throw new Error('No VRM data found');

      VRMUtils.removeUnnecessaryJoints(vrm.scene);
      VRMUtils.removeUnnecessaryVertices(vrm.scene);

      if (currentVRM) {
        scene.remove(currentVRM.scene);
        VRMUtils.deepDispose(currentVRM.scene);
      }

      vrm.scene.traverse((obj) => {
        obj.frustumCulled = false;
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      scene.add(vrm.scene);
      currentVRM = vrm;

      // Frame the model
      const box = new THREE.Box3().setFromObject(vrm.scene);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      controls.target.set(center.x, center.y, center.z);
      camera.position.set(center.x + 0.3, center.y + size.y * 0.15, size.y * 2.2);
      controls.update();

      console.log('VRM loaded:', vrm.meta);
      return vrm;
    }

    async function loadVRMFromFile(file) {
      const url = URL.createObjectURL(file);
      try {
        return await loadVRMFromURL(url);
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    // --- Procedural JSON Animation (Klaus's format) ---
    function applyProceduralAnimation(animData, vrm) {
      const { keyframes, duration } = animData;

      proceduralAnim = {
        duration,
        loop: animData.loop !== false,
        keyframes,
        time: 0,
      };

      updateHUD(`breathing idle — ${duration}s loop`);
    }

    function updateProceduralAnimation(delta) {
      if (!proceduralAnim || !currentVRM) return;

      proceduralAnim.time += delta;
      if (proceduralAnim.loop) {
        proceduralAnim.time %= proceduralAnim.duration;
      }

      const t = proceduralAnim.time;
      const kf = proceduralAnim.keyframes;

      for (const [boneName, frames] of Object.entries(kf)) {
        if (boneName === 'hips_position') {
          // Hip position offset
          const vrmBone = currentVRM.humanoid.getNormalizedBoneNode(VRMHumanBoneName.Hips);
          if (!vrmBone) continue;
          const frame = interpolateFrame(frames, t, 'position');
          if (frame) {
            // Apply as offset from rest position
            vrmBone.position.y += frame[1];
          }
          continue;
        }

        const vrmBoneName = JSON_BONE_MAP[boneName];
        if (!vrmBoneName) continue;

        const vrmBone = currentVRM.humanoid.getNormalizedBoneNode(vrmBoneName);
        if (!vrmBone) continue;

        const rot = interpolateFrame(frames, t, 'rotation');
        if (rot) {
          vrmBone.quaternion.set(rot[0], rot[1], rot[2], rot[3]);
        }
      }
    }

    function interpolateFrame(frames, time, prop) {
      if (!frames || frames.length === 0) return null;

      // Find surrounding keyframes
      let prev = frames[0];
      let next = frames[0];

      for (let i = 0; i < frames.length; i++) {
        if (frames[i].time <= time) {
          prev = frames[i];
          next = frames[Math.min(i + 1, frames.length - 1)];
        } else {
          next = frames[i];
          break;
        }
      }

      const val = prev[prop];
      if (!val) return null;

      // Simple case — same frame
      if (prev === next || prev.time === next.time) return val;

      // Lerp
      const alpha = (time - prev.time) / (next.time - prev.time);
      const nextVal = next[prop];
      if (!nextVal) return val;

      if (prop === 'rotation') {
        // Slerp quaternions
        const q1 = new THREE.Quaternion(val[0], val[1], val[2], val[3]);
        const q2 = new THREE.Quaternion(nextVal[0], nextVal[1], nextVal[2], nextVal[3]);
        q1.slerp(q2, alpha);
        return [q1.x, q1.y, q1.z, q1.w];
      } else {
        // Lerp vectors
        return val.map((v, i) => v + (nextVal[i] - v) * alpha);
      }
    }

    // --- Mixamo FBX retarget (for drag & drop) ---
    function retargetMixamoClip(fbxScene, vrm) {
      const clip = fbxScene.animations[0];
      if (!clip) throw new Error('No animation in FBX');

      const mixamoBones = {};
      fbxScene.traverse((obj) => { if (obj.isBone) mixamoBones[obj.name] = obj; });

      const mixamoHips = mixamoBones['mixamorigHips'];
      const mixamoHipsHeight = mixamoHips ? mixamoHips.position.y : 1.0;
      const vrmHipsBone = vrm.humanoid.getNormalizedBoneNode(VRMHumanBoneName.Hips);
      const vrmHipsPos = new THREE.Vector3();
      vrmHipsBone.getWorldPosition(vrmHipsPos);
      const heightScale = vrmHipsPos.y / mixamoHipsHeight;

      const tracks = [];
      for (const track of clip.tracks) {
        const dotIdx = track.name.indexOf('.');
        const boneName = track.name.substring(0, dotIdx);
        const property = track.name.substring(dotIdx + 1);
        const vrmBoneName = MIXAMO_TO_VRM[boneName];
        if (!vrmBoneName) continue;
        const vrmBoneNode = vrm.humanoid.getNormalizedBoneNode(vrmBoneName);
        if (!vrmBoneNode) continue;

        if (property === 'quaternion') {
          const mixamoBone = mixamoBones[boneName];
          const boneRest = getWorldRestQuat(mixamoBone);
          const parentRest = mixamoBone.parent ? getWorldRestQuat(mixamoBone.parent) : new THREE.Quaternion();
          const values = new Float32Array(track.values.length);
          for (let i = 0; i < track.values.length; i += 4) {
            const q = new THREE.Quaternion(track.values[i], track.values[i+1], track.values[i+2], track.values[i+3]);
            const r = new THREE.Quaternion().copy(parentRest).multiply(q).multiply(boneRest.clone().invert());
            values[i] = r.x; values[i+1] = r.y; values[i+2] = r.z; values[i+3] = r.w;
          }
          tracks.push(new THREE.QuaternionKeyframeTrack(`${vrmBoneNode.name}.quaternion`, Array.from(track.times), Array.from(values)));
        } else if (property === 'position' && vrmBoneName === VRMHumanBoneName.Hips) {
          const values = new Float32Array(track.values.length);
          for (let i = 0; i < track.values.length; i += 3) {
            values[i] = track.values[i] * heightScale;
            values[i+1] = track.values[i+1] * heightScale;
            values[i+2] = track.values[i+2] * heightScale;
          }
          tracks.push(new THREE.VectorKeyframeTrack(`${vrmBoneNode.name}.position`, Array.from(track.times), Array.from(values)));
        }
      }
      return new THREE.AnimationClip('retargeted', clip.duration, tracks);
    }

    function getWorldRestQuat(bone) {
      const q = new THREE.Quaternion();
      const chain = [];
      let c = bone;
      while (c) { chain.unshift(c); c = c.parent; }
      for (const n of chain) q.multiply(n.quaternion.clone());
      return q;
    }

    // --- Drag & Drop (FBX or JSON override) ---
    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', async (e) => {
      e.preventDefault();
      for (const file of e.dataTransfer.files) {
        const name = file.name.toLowerCase();
        if (name.endsWith('.vrm')) {
          await loadVRMFromFile(file);
        } else if (name.endsWith('.fbx') && currentVRM) {
          proceduralAnim = null;
          const loader = new FBXLoader();
          const buf = await file.arrayBuffer();
          const fbx = loader.parse(buf, '');
          if (!fbx.animations?.length) { updateHUD('no animation in FBX'); return; }
          if (mixer) mixer.stopAllAction();
          mixer = new THREE.AnimationMixer(currentVRM.scene);
          const clip = retargetMixamoClip(fbx, currentVRM);
          mixer.clipAction(clip).play();
          updateHUD(`fbx: ${clip.duration.toFixed(1)}s`);
        } else if (name.endsWith('.json') && currentVRM) {
          const text = await file.text();
          const animData = JSON.parse(text);
          mixer = null;
          applyProceduralAnimation(animData, currentVRM);
        }
      }
    });

    // --- HUD ---
    function updateHUD(text) {
      document.getElementById('anim-info').textContent = text;
    }

    // --- Auto-load from assets/ ---
    async function init() {
      try {
        updateHUD('loading wolfman...');

        // Load VRM
        await loadVRMFromURL('../assets/wolfman.vrm');
        updateHUD('loading animation...');

        // Load procedural breathing animation
        const resp = await fetch('../assets/animations/breathing-idle.json');
        if (resp.ok) {
          const animData = await resp.json();
          applyProceduralAnimation(animData, currentVRM);
        } else {
          updateHUD('model loaded — drop .fbx or .json to animate');
        }
      } catch (err) {
        console.error('Init error:', err);
        updateHUD('drop .vrm file to start');
      }

      // Fade out loading screen
      document.getElementById('loading').classList.add('hidden');
    }

    // --- Render loop ---
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (mixer) mixer.update(delta);
      if (proceduralAnim) updateProceduralAnimation(delta);
      if (currentVRM) currentVRM.update(delta);

      controls.update();
      renderer.render(scene, camera);
    }
    animate();
    init();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
